name: Publish Approved Nodal Domains Puzzles

on:
  push:
    paths:
      - 'puzzles-queue.json'

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Publish approved puzzles
        run: node publish-puzzle.js

      - name: Commit if files changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nodal-domains-v2.html puzzles-queue.json
          if git diff --staged --quiet; then
            echo "No approved puzzles to publish. Nothing to commit."
          else
            git commit -m "chore: publish approved nodal domains puzzles"
            git push
          fi
