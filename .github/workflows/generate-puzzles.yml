name: Generate Nodal Domains Puzzles

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate puzzles
        run: node generate-puzzle.js 30

      - name: Commit if queue changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add puzzles-queue.json
          if git diff --staged --quiet; then
            echo "Queue already full. Nothing to commit."
          else
            git commit -m "chore: top up puzzle queue"
            git push
          fi
