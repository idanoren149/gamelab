<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Nodal Domains — Review</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #FAF9F6; color: #1a1a1a;
      min-height: 100vh; -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }
    .app { max-width: 440px; margin: 0 auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; padding-bottom: 40px; }
    h1 { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
    .subtitle { font-size: 12px; color: #888; margin-top: 2px; }
    .card { background: white; border-radius: 16px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); display: flex; flex-direction: column; gap: 10px; }
    .card-title { font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.06em; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 12px; font-weight: 600; color: #777; }
    .field input { padding: 8px 10px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 14px; background: #fafafa; color: #111; width: 100%; font-family: monospace; }
    .field input:focus { outline: none; border-color: #6699CC; }
    .hint { font-size: 11px; color: #aaa; }
    .hint a { color: #6699CC; }
    .btn { padding: 10px 16px; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.1s; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-primary  { background: #6699CC; color: white; }
    .btn-primary:not(:disabled):active  { background: #5080B8; }
    .btn-secondary { background: #f3f4f6; color: #374151; }
    .btn-secondary:not(:disabled):active { background: #e5e7eb; }
    .btn-approve { background: #dcfce7; color: #16a34a; }
    .btn-approve:not(:disabled):active { background: #bbf7d0; }
    .btn-reject { background: #fee2e2; color: #dc2626; }
    .btn-reject:not(:disabled):active  { background: #fecaca; }
    .row { display: flex; gap: 8px; }
    .row .btn { flex: 1; }
    .counter { font-size: 13px; color: #888; text-align: center; line-height: 1.5; }
    .counter b { color: #111; }
    .diff-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; }
    .diff-badge.Easy   { background: #dcfce7; color: #16a34a; }
    .diff-badge.Medium { background: #fef9c3; color: #ca8a04; }
    .diff-badge.Hard   { background: #fee2e2; color: #dc2626; }
    .puzzle-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 13px; color: #555; }
    .grid-wrap { display: flex; justify-content: center; padding: 4px 0; }
    .grid { display: grid; }
    .cell {
      position: relative; cursor: pointer; user-select: none; -webkit-user-select: none;
      border-radius: 4px; border-style: solid;
      transition: background-color 0.12s ease; touch-action: manipulation;
    }
    .cell.seeded { cursor: default; }
    .cell .d-id { position: absolute; top: 2px; right: 3px; font-size: 9px; font-weight: 700; line-height: 1; color: rgba(255,255,255,0.75); pointer-events: none; }
    .cell .c-icon { position: absolute; bottom: 1px; left: 2px; font-size: 8px; line-height: 1; pointer-events: none; }
    .stats-bar { display: flex; justify-content: space-between; font-size: 13px; color: #555; }
    .stats-bar b { color: #111; font-weight: 700; }
    .stats-bar b.match { color: #16a34a; }
    .reset-link { cursor: pointer; color: #6699CC; font-size: 12px; }
    .msg { font-size: 13px; text-align: center; padding: 4px 0; min-height: 20px; }
    .msg.error   { color: #dc2626; }
    .msg.success { color: #16a34a; }
    .hidden { display: none !important; }
    @media (prefers-color-scheme: dark) {
      body { background: #111113; color: #e8e6df; }
      .card { background: #1a1a1e; box-shadow: none; }
      .card-title { color: #555; }
      .field label { color: #777; }
      .field input { background: #252528; border-color: #333; color: #e8e6df; }
      .btn-secondary { background: #1e1e22; color: #d1d5db; }
      .counter b { color: #f0ede6; }
      .stats-bar b { color: #f0ede6; }
      .hint { color: #555; }
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>Nodal Domains — Review</h1>
    <div class="subtitle">Approve or reject daily puzzle candidates</div>
  </header>

  <!-- Token setup -->
  <div class="card" id="token-card">
    <div class="card-title">GitHub Access</div>
    <div class="field">
      <label for="token-in">Personal Access Token</label>
      <input type="password" id="token-in" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
      <span class="hint">
        Needs <b>public_repo</b> scope. Saved in your browser only.<br>
        <a href="https://github.com/settings/tokens/new?scopes=public_repo&description=Nodal+Domains+Review" target="_blank">Generate a token on GitHub →</a>
      </span>
    </div>
    <button class="btn btn-primary" onclick="saveToken()">Save &amp; load queue</button>
    <div id="token-msg" class="msg"></div>
  </div>

  <!-- Review panel -->
  <div class="card hidden" id="review-card">
    <div class="card-title">Review Puzzle</div>
    <div class="counter" id="counter"></div>
    <div class="puzzle-meta" id="puzzle-meta"></div>
    <div class="stats-bar">
      <span id="stat-domains"></span>
      <span class="reset-link" onclick="resetPuzzle()">Reset</span>
    </div>
    <div class="grid-wrap"><div class="grid" id="review-grid"></div></div>
    <div class="row">
      <button class="btn btn-approve"   onclick="decide('approved')">&#10003; Approve</button>
      <button class="btn btn-reject"    onclick="decide('rejected')">&#10007; Reject</button>
      <button class="btn btn-secondary" onclick="decide('skip')">Skip &#8594;</button>
    </div>
  </div>

  <!-- No more puzzles -->
  <div class="card hidden" id="done-card">
    <div class="card-title">Session Complete</div>
    <div class="counter" id="done-counter"></div>
  </div>

  <!-- Save -->
  <div class="card hidden" id="save-card">
    <div class="card-title">Save Decisions</div>
    <button class="btn btn-primary" id="save-btn" onclick="saveDecisions()">Save &amp; Publish to GitHub</button>
    <div id="save-msg" class="msg"></div>
  </div>
</div>

<script>
const OWNER = 'idanoren149';
const REPO  = 'gamelab';
const FILE  = 'domains/puzzles-queue.json';
const API   = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`;
const DIRS  = [[-1,0],[1,0],[0,-1],[0,1]];
const dark  = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

const BG = {
  blue: '#6699CC', red: '#CC6655',
  seedBlue: '#446699', seedRed: '#994433',
  none: dark ? '#1e1e22' : '#E8E6DF',
};
const BORDER = { blue: '#2E547A', red: '#7A3322', none: dark ? '#2d2d32' : '#C0BEB8' };

// ─── Auth ─────────────────────────────────────────────────────────────────────

function getToken() { return localStorage.getItem('nd_review_token') || ''; }

function saveToken() {
  const tok = document.getElementById('token-in').value.trim();
  if (!tok) { setMsg('token-msg', 'Please enter a token first.', true); return; }
  localStorage.setItem('nd_review_token', tok);
  loadQueue();
}

function setMsg(id, text, isError) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg' + (isError ? ' error' : ' success');
}

// ─── State ────────────────────────────────────────────────────────────────────

let queue   = [];
let pending = [];
let pidx    = 0;
let fileSha = '';
let session = { approved: 0, rejected: 0 };
let grid    = [];
let won     = false;

// ─── Load ─────────────────────────────────────────────────────────────────────

async function loadQueue() {
  setMsg('token-msg', 'Loading...', false);
  try {
    const res = await fetch(API, {
      headers: { Authorization: `token ${getToken()}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (!res.ok) throw new Error(`GitHub API error ${res.status}: ${res.statusText}`);
    const meta = await res.json();
    fileSha = meta.sha;
    queue   = JSON.parse(atob(meta.content.replace(/\n/g, '')));
    pending = queue.map((p, i) => ({...p, _qi: i})).filter(p => p.status === 'pending');
    pidx = 0; session = { approved: 0, rejected: 0 };
    document.getElementById('token-card').classList.add('hidden');
    document.getElementById('save-card').classList.remove('hidden');
    showPuzzle();
  } catch (e) {
    setMsg('token-msg', `Error: ${e.message}`, true);
  }
}

// ─── Game logic ───────────────────────────────────────────────────────────────

function countDomains(g, rows, cols) {
  const vis = Array.from({length: rows}, () => new Array(cols).fill(false));
  let n = 0;
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    if (g[r][c] === -1 || vis[r][c]) continue;
    n++;
    const color = g[r][c], q = [[r, c]]; vis[r][c] = true;
    while (q.length) {
      const [cr, cc] = q.shift();
      for (const [dr, dc] of DIRS) {
        const nr = cr+dr, nc = cc+dc;
        if (nr>=0&&nr<rows&&nc>=0&&nc<cols&&g[nr][nc]===color&&!vis[nr][nc]) { vis[nr][nc]=true; q.push([nr,nc]); }
      }
    }
  }
  return n;
}

function getDomainMap(g, rows, cols) {
  const map = Array.from({length: rows}, () => new Array(cols).fill(null)); let id = 0;
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    if (g[r][c]===-1||map[r][c]!==null) continue;
    const color=g[r][c], q=[[r,c]]; map[r][c]=id;
    while(q.length){const[cr,cc]=q.shift();for(const[dr,dc]of DIRS){const nr=cr+dr,nc=cc+dc;if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&g[nr][nc]===color&&map[nr][nc]===null){map[nr][nc]=id;q.push([nr,nc]);}}}
    id++;
  }
  return map;
}

function initGrid(p) {
  const g = Array.from({length: p.rows}, () => new Array(p.cols).fill(-1));
  for (const [k, v] of Object.entries(p.seeds)) { const [r,c]=k.split(',').map(Number); g[r][c]=v; }
  return g;
}

// ─── Render ───────────────────────────────────────────────────────────────────

function showPuzzle() {
  updateCounter();
  if (pidx >= pending.length) {
    document.getElementById('review-card').classList.add('hidden');
    document.getElementById('done-card').classList.remove('hidden');
    document.getElementById('done-counter').innerHTML =
      `All ${pending.length} pending puzzles reviewed this session.<br>` +
      `<b style="color:#16a34a">${session.approved}</b> approved &nbsp; <b style="color:#dc2626">${session.rejected}</b> rejected &nbsp; ${pending.length - session.approved - session.rejected} skipped`;
    return;
  }
  const p = pending[pidx];
  grid = initGrid(p); won = false;
  document.getElementById('puzzle-meta').innerHTML =
    `<span class="diff-badge ${p.difficulty}">${p.difficulty}</span>
     <span>${p.rows}&#215;${p.cols} &middot; ${p.target} domains &middot; ${Object.keys(p.seeds).length} seeds</span>`;
  document.getElementById('review-card').classList.remove('hidden');
  renderGrid(p);
  updateDomainStat(p);
}

function renderGrid(p) {
  const dmap = getDomainMap(grid, p.rows, p.cols);
  const GAP = 4, MAX = 340;
  const sz = Math.max(44, Math.min(72, Math.floor((MAX - (p.cols-1)*GAP) / p.cols)));
  const gridEl = document.getElementById('review-grid');
  gridEl.style.gridTemplateColumns = `repeat(${p.cols}, ${sz}px)`;
  gridEl.style.gap = GAP + 'px';
  gridEl.innerHTML = '';
  for (let r = 0; r < p.rows; r++) for (let c = 0; c < p.cols; c++) {
    const color=grid[r][c], did=dmap[r][c], key=`${r},${c}`, seeded=p.seeds[key]!==undefined;
    const sT=r>0&&did!==null&&dmap[r-1][c]===did, sB=r<p.rows-1&&did!==null&&dmap[r+1][c]===did;
    const sL=c>0&&did!==null&&dmap[r][c-1]===did, sR=c<p.cols-1&&did!==null&&dmap[r][c+1]===did;
    const bg = color===0?(seeded?BG.seedBlue:BG.blue):color===1?(seeded?BG.seedRed:BG.red):BG.none;
    const bd = color===0?BORDER.blue:color===1?BORDER.red:BORDER.none;
    const div = document.createElement('div');
    div.className = 'cell' + (seeded ? ' seeded' : '');
    div.style.cssText = [
      `width:${sz}px`,`height:${sz}px`,`min-width:44px`,`min-height:44px`,
      `background-color:${bg}`,`border-color:${bd}`,
      `border-top-width:${sT?0:2}px`,`border-bottom-width:${sB?0:2}px`,
      `border-left-width:${sL?0:2}px`,`border-right-width:${sR?0:2}px`,
    ].join(';');
    if (color!==-1&&did!==null) {
      const s=document.createElement('span'); s.className='d-id'; s.textContent=did+1; div.appendChild(s);
    }
    if (seeded) {
      const ico=document.createElement('span'); ico.className='c-icon'; ico.textContent='&#128274;'; div.appendChild(ico);
    }
    if (!seeded && !won) {
      div.addEventListener('click', () => tap(r, c));
      div.addEventListener('touchend', e => { e.preventDefault(); tap(r, c); }, {passive: false});
    }
    gridEl.appendChild(div);
  }
}

function tap(r, c) {
  const p = pending[pidx], key = `${r},${c}`;
  if (p.seeds[key] !== undefined || won) return;
  const cur = grid[r][c];
  grid[r][c] = cur===-1 ? 0 : cur===0 ? 1 : -1;
  renderGrid(p); updateDomainStat(p); checkWin(p);
}

function updateDomainStat(p) {
  const doms = countDomains(grid, p.rows, p.cols);
  const full = grid.every(row => row.every(v => v !== -1));
  const match = full && doms === p.target;
  document.getElementById('stat-domains').innerHTML =
    `Domains: <b${match?' class="match"':''}>${doms}</b> / Target: <b>${p.target}</b>`;
}

function checkWin(p) {
  const full = grid.every(row => row.every(v => v !== -1));
  if (full && countDomains(grid, p.rows, p.cols) === p.target && !won) won = true;
}

function resetPuzzle() {
  const p = pending[pidx]; grid = initGrid(p); won = false;
  renderGrid(p); updateDomainStat(p);
}

function updateCounter() {
  document.getElementById('counter').innerHTML =
    `Puzzle <b>${Math.min(pidx+1, pending.length)}</b> of <b>${pending.length}</b> pending &nbsp;&middot;&nbsp; ` +
    `<b style="color:#16a34a">${session.approved}</b> approved &nbsp; <b style="color:#dc2626">${session.rejected}</b> rejected`;
}

// ─── Decisions ────────────────────────────────────────────────────────────────

function decide(action) {
  if (action !== 'skip') {
    queue[pending[pidx]._qi].status = action;
    if (action === 'approved') session.approved++;
    if (action === 'rejected') session.rejected++;
  }
  pidx++;
  showPuzzle();
}

// ─── Save ─────────────────────────────────────────────────────────────────────

async function saveDecisions() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Saving...';
  setMsg('save-msg', '', false);
  try {
    const body = JSON.stringify({
      message: `review: ${session.approved} approved, ${session.rejected} rejected nodal domains puzzles`,
      content: btoa(unescape(encodeURIComponent(JSON.stringify(queue, null, 2)))),
      sha: fileSha,
    });
    const res = await fetch(API, {
      method: 'PUT',
      headers: {
        Authorization: `token ${getToken()}`,
        Accept: 'application/vnd.github.v3+json',
        'Content-Type': 'application/json',
      },
      body,
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.message || res.statusText); }
    const data = await res.json();
    fileSha = data.content.sha;
    const approvedTotal = queue.filter(p => p.status === 'approved').length;
    setMsg('save-msg', `Saved! ${approvedTotal} puzzle(s) queued for publishing. GitHub Actions will publish them in ~1 minute.`, false);
    btn.textContent = 'Saved ✓';
  } catch (e) {
    setMsg('save-msg', `Error: ${e.message}`, true);
    btn.disabled = false; btn.textContent = 'Save & Publish to GitHub';
  }
}

// ─── Init ─────────────────────────────────────────────────────────────────────

const stored = getToken();
if (stored) { document.getElementById('token-in').value = stored; loadQueue(); }
</script>
</body>
</html>
